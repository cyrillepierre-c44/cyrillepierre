<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">
  <title>Requête invalide — Cyrille PIERRE</title>
  <link rel="icon" href="/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      background: #050a15;
      color: #e2e8f0;
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { text-align: center; max-width: 480px; }
    .error-code {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: clamp(6rem, 20vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #00d4ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 600;
      margin: 1rem 0 0.75rem;
    }
    p {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.65rem 1.75rem;
      background: transparent;
      border: 1.5px solid #00d4ff;
      color: #00d4ff;
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }
    a:hover { background: #00d4ff; color: #050a15; }
  </style>
</head>
<body>
  <main>
    <div class="error-code">422</div>
    <h1>Requête invalide</h1>
    <p>La requête n'a pas pu être traitée. Si le problème persiste, essayez de recharger la page.</p>
    <a href="/">Retour à l'accueil</a>
  </main>
</body>
</html>
